<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Secondo Doc Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:#0a0a0f;color:#e8e6f0;line-height:1.6;padding:32px}
.wrap{max-width:860px;margin:0 auto}
.back{display:inline-block;margin-bottom:24px;color:#8b7fd8;text-decoration:none;font-size:14px}
.back:hover{color:#c9a449}
h1,h2,h3,h4{color:#fff;margin:24px 0 12px;font-weight:600}
h1{font-size:32px;border-bottom:1px solid #2a2a3a;padding-bottom:12px}
h2{font-size:24px;color:#c9a449}
h3{font-size:18px;color:#8b7fd8}
p,li{margin:8px 0;color:#c8c4d8}
ul,ol{padding-left:24px}
a{color:#8b7fd8}
code{background:#1a1a28;padding:2px 6px;border-radius:4px;font-size:13px;color:#c9a449}
pre{background:#1a1a28;padding:16px;border-radius:8px;overflow-x:auto;margin:12px 0}
pre code{background:none;padding:0}
table{border-collapse:collapse;margin:16px 0;width:100%}
th,td{border:1px solid #2a2a3a;padding:8px 12px;text-align:left}
th{background:#1a1a28;color:#c9a449}
blockquote{border-left:3px solid #8b7fd8;padding-left:16px;margin:12px 0;color:#a09dbc;font-style:italic}
hr{border:none;border-top:1px solid #2a2a3a;margin:24px 0}
</style></head><body>
<div class="wrap">
<a class="back" href="secondo-hub.html">← Back to Hub</a>
<div id="content">Loading…</div>
</div>
<script>
const doc=new URLSearchParams(location.search).get('doc');
if(!doc){document.getElementById('content').innerText='No doc specified';}
else{fetch(doc).then(r=>r.text()).then(md=>{document.title='Secondo · '+doc.replace(/\.md$/,'');document.getElementById('content').innerHTML=marked.parse(md);}).catch(e=>{document.getElementById('content').innerText='Error loading '+doc+': '+e;});}
</script>
</body></html>
